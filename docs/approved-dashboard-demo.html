<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>SmithMk Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
--bg:#0a0a0d;--card:rgba(22,22,28,0.92);--card-hi:rgba(30,30,38,0.95);
--border:rgba(255,255,255,0.07);--border-hi:rgba(255,255,255,0.12);
--amber:#FFB300;--gold:#c4a96b;--heat:#FF6B35;--cool:#48CAE4;
--green:#4ADE80;--red:#F87171;
--t1:#EEEEEE;--t2:#B0B0B0;--t3:#555;
--shadow-up:0 -1px 0 rgba(255,255,255,0.04);
--shadow-card:0 8px 32px rgba(0,0,0,0.5),0 2px 8px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.06);
--shadow-card-hover:0 14px 44px rgba(0,0,0,0.55),0 4px 12px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.08);
--shadow-raised:4px 4px 12px rgba(0,0,0,0.5),-3px -3px 8px rgba(255,255,255,0.02);
--shadow-inset:inset 3px 3px 6px rgba(0,0,0,0.4),inset -2px -2px 4px rgba(255,255,255,0.02);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden;
background-image:radial-gradient(ellipse 700px 500px at 85% 8%,rgba(255,179,0,0.03),transparent),
radial-gradient(ellipse 500px 500px at 10% 80%,rgba(72,202,228,0.02),transparent),
radial-gradient(ellipse 300px 300px at 50% 50%,rgba(255,255,255,0.005),transparent)}



/* ═══ LAYOUT ═══ */
.wrap{max-width:1100px;margin:0 auto;padding:24px 20px 80px}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.greet{font-size:24px;font-weight:600;color:var(--gold);letter-spacing:-0.3px}
.date{font-size:11px;color:var(--t3);margin-top:3px}
.clk{font-size:32px;font-weight:200;letter-spacing:-1.5px;text-align:right;font-variant-numeric:tabular-nums;color:var(--t1)}
.pills{display:flex;gap:8px;margin-bottom:20px}
.pill{display:flex;align-items:center;gap:5px;padding:4px 10px;
background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:8px;
font-size:9px;font-weight:600;color:#777;letter-spacing:0.5px;
box-shadow:var(--shadow-raised)}
.pdot{width:5px;height:5px;border-radius:50%}
.pdot.g{background:var(--green);box-shadow:0 0 6px rgba(74,222,128,0.5)}
.pdot.r{background:var(--red);box-shadow:0 0 6px rgba(248,113,113,0.5)}

/* ═══ GRID ═══ */
.grid{display:grid;grid-template-columns:1fr;gap:16px}
/* Two columns on wider screens */
@media(min-width:700px){.grid{grid-template-columns:1fr 1fr;gap:16px}}
/* Two columns forced in landscape even on phones */
@media(orientation:landscape) and (min-width:600px){.grid{grid-template-columns:1fr 1fr;gap:14px}.wrap{padding:16px 20px 40px}}
/* Phone portrait — single column, tighter padding */
@media(max-width:600px) and (orientation:portrait){.wrap{padding:16px 14px 40px}.greet{font-size:20px}.clk{font-size:26px}}

/* ═══ 3D GLASS CARD — the money shot ═══ */
.card{
background:linear-gradient(165deg,var(--card-hi),var(--card));
border:1px solid var(--border);
border-radius:22px;padding:22px;
position:relative;overflow:hidden;
box-shadow:var(--shadow-card);
transition:all 0.35s cubic-bezier(0.4,0,0.2,1)}
/* Top edge highlight — like light catching glass */
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
background:linear-gradient(90deg,transparent 5%,rgba(255,255,255,0.1) 30%,rgba(255,255,255,0.15) 50%,rgba(255,255,255,0.1) 70%,transparent 95%);pointer-events:none}
/* Inner top glow */
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:45%;
background:linear-gradient(180deg,rgba(255,255,255,0.04),transparent);pointer-events:none;border-radius:22px 22px 0 0}
.card:hover{box-shadow:var(--shadow-card-hover);border-color:var(--border-hi);transform:translateY(-2px)}
.card[draggable=true]{cursor:grab}.card[draggable=true]:active{cursor:grabbing}
.card.dragging{opacity:0.25;transform:scale(0.94)}
.card.drag-over{border-color:rgba(255,179,0,0.5);box-shadow:0 0 40px rgba(255,179,0,0.1),var(--shadow-card)}

.sl{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:1.5px}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;position:relative;z-index:1}
.ch svg{width:22px;height:22px;stroke:var(--t3);fill:none;stroke-width:16;stroke-linecap:round;stroke-linejoin:round}

/* ═══ 3D THERMOSTAT — clean bezel + deep face ═══ */
.thermo-wrap{display:flex;flex-direction:column;align-items:center;position:relative;z-index:1}
.thermo-bezel{position:relative;width:250px;height:250px;margin:8px 0 14px;border-radius:50%;
filter:drop-shadow(0 18px 36px rgba(0,0,0,0.7)) drop-shadow(0 4px 10px rgba(0,0,0,0.4))}
.thermo-outer{position:absolute;inset:0;border-radius:50%;
background:conic-gradient(from 210deg,#3a3a3a,#2e2e2e 15%,#222 35%,#181818 50%,#222 65%,#2e2e2e 85%,#3a3a3a);
box-shadow:inset 0 2px 0 rgba(255,255,255,0.14),inset 0 -2px 0 rgba(0,0,0,0.4)}
.thermo-inner{position:absolute;top:16px;left:16px;right:16px;bottom:16px;border-radius:50%;
background:radial-gradient(circle at 44% 38%,#171717,#0c0c0c 60%,#070707);
box-shadow:inset 0 6px 20px rgba(0,0,0,0.8),inset 0 -2px 6px rgba(255,255,255,0.015);
border:1px solid rgba(255,255,255,0.03)}
.thermo-inner canvas{width:218px;height:218px;touch-action:none;cursor:pointer;position:relative;z-index:1}
.thermo-outer::after{content:'';position:absolute;inset:0;border-radius:50%;
background:linear-gradient(105deg,transparent 34%,rgba(255,255,255,0.09) 44%,rgba(255,255,255,0.03) 54%,transparent 64%);
background-size:250% 100%;animation:shimmer 5s ease-in-out infinite;pointer-events:none}
.thermo-outer::before{content:'';position:absolute;top:2px;left:12%;right:55%;height:28%;border-radius:50%;
background:linear-gradient(180deg,rgba(255,255,255,0.1),transparent);pointer-events:none}
@keyframes shimmer{0%,100%{background-position:200% 0}50%{background-position:-50% 0}}
.thermo-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;z-index:4}
.thv{font-size:42px;font-weight:200;line-height:1;transition:color 0.3s}
.ths{font-size:9px;font-weight:700;letter-spacing:2px;margin-top:4px;transition:opacity 0.3s}
.thcur{font-size:10px;color:var(--t3);margin-top:2px;transition:opacity 0.3s}
.mt{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;cursor:pointer;font-size:9px;font-weight:700;letter-spacing:1px}
.mt.h{background:rgba(255,107,53,0.12);border:1px solid rgba(255,107,53,0.3);color:var(--heat)}
.mt.c{background:rgba(72,202,228,0.12);border:1px solid rgba(72,202,228,0.3);color:var(--cool)}
.tbtns{display:flex;gap:16px;align-items:center;margin-top:10px;position:relative;z-index:1}

/* ═══ 3D BUTTONS — raised, bevelled, press-down ═══ */
.btn3d{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;
background:linear-gradient(145deg,#2a2a2a,#181818);border:1px solid rgba(255,255,255,0.06);
box-shadow:4px 4px 12px rgba(0,0,0,0.5),-2px -2px 6px rgba(255,255,255,0.02),inset 0 1px 0 rgba(255,255,255,0.06);
color:#999;font-size:18px;font-weight:600;transition:all 0.15s}
.btn3d:active{transform:scale(0.88);box-shadow:inset 2px 2px 6px rgba(0,0,0,0.4),inset -1px -1px 3px rgba(255,255,255,0.02)}
.pwr3d{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;
background:linear-gradient(145deg,#282828,#161616);border:2px solid rgba(255,255,255,0.05);
box-shadow:5px 5px 16px rgba(0,0,0,0.6),-3px -3px 8px rgba(255,255,255,0.02),inset 0 1px 0 rgba(255,255,255,0.06);
transition:all 0.2s}
.pwr3d:active{transform:scale(0.9);box-shadow:inset 3px 3px 8px rgba(0,0,0,0.5)}
.pwr3d.on{background:linear-gradient(145deg,#3a2010,#2a1508);border-color:rgba(255,107,53,0.35);
box-shadow:0 0 24px rgba(255,107,53,0.15),5px 5px 16px rgba(0,0,0,0.5),-3px -3px 8px rgba(255,255,255,0.01)}
.pwr-icon{width:22px;height:22px;border:2.5px solid #555;border-radius:50%;border-top-color:transparent;position:relative}
.pwr-icon::after{content:'';position:absolute;top:-3px;left:50%;transform:translateX(-50%);width:2.5px;height:12px;background:#555;border-radius:1px}
.pwr3d.on .pwr-icon{border-color:var(--heat);border-top-color:transparent}.pwr3d.on .pwr-icon::after{background:var(--heat)}

/* ═══ SCENES (emoji kept) ═══ */
.scr{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;position:relative;z-index:1}
.sc{flex-shrink:0;padding:10px 16px;border-radius:14px;text-align:center;cursor:pointer;
background:linear-gradient(145deg,rgba(30,30,38,0.9),rgba(20,20,26,0.9));
border:1px solid var(--border);box-shadow:var(--shadow-raised);transition:all 0.2s}
.sc:active{transform:scale(0.95)}
.sc.a{background:rgba(255,179,0,0.08);border-color:rgba(255,179,0,0.25);box-shadow:0 0 16px rgba(255,179,0,0.06),var(--shadow-raised)}
.sc .e{font-size:24px;display:block;margin-bottom:4px}.sc .n{font-size:9px;font-weight:600;color:#777}.sc.a .n{color:var(--amber)}

/* ═══ STATUS SUB-CARDS — 3D raised, tappable ═══ */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:12px;position:relative;z-index:1}
.sc2{background:linear-gradient(165deg,rgba(28,28,36,0.95),rgba(18,18,24,0.95));
border:1px solid var(--border);border-radius:16px;padding:16px;
box-shadow:var(--shadow-raised);transition:all 0.3s;cursor:pointer;position:relative;overflow:hidden}
.sc2::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent)}
.sc2::after{content:'';position:absolute;top:0;left:0;right:0;height:35%;background:linear-gradient(180deg,rgba(255,255,255,0.03),transparent);pointer-events:none;border-radius:16px 16px 0 0}
.sc2:hover{transform:translateY(-2px);box-shadow:6px 6px 18px rgba(0,0,0,0.5),-3px -3px 8px rgba(255,255,255,0.02)}
.sc2:active{transform:scale(0.97);box-shadow:var(--shadow-inset)}
.sc2 .arrow{font-size:12px;color:var(--t3);transition:color 0.2s}.sc2:hover .arrow{color:var(--amber)}
.sc2 svg{width:22px;height:22px;stroke:var(--t3);fill:none;stroke-width:16;stroke-linecap:round;stroke-linejoin:round}
.sv{font-size:22px;font-weight:600;margin-top:8px}.ss{font-size:9px;color:var(--t3);margin-top:3px}

/* ═══ ENERGY GAUGES 100px + glass ring ═══ */
.eg{display:flex;justify-content:space-around;margin-top:14px;flex-wrap:wrap;gap:10px;position:relative;z-index:1}
.gw{text-align:center}
.gc{width:100px;height:100px;position:relative;margin:0 auto 6px;
border-radius:50%;box-shadow:var(--shadow-raised)}
.gc canvas{width:100px;height:100px;position:relative;z-index:1}
.gc::before{content:'';position:absolute;inset:8px;border-radius:50%;
background:radial-gradient(circle,rgba(255,255,255,0.015),transparent);
box-shadow:inset 0 2px 8px rgba(0,0,0,0.4),inset 0 -1px 0 rgba(255,255,255,0.02);z-index:2;pointer-events:none}
.gv{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:18px;font-weight:700;z-index:3}
.gl{font-size:10px;color:var(--t3);font-weight:500}

/* ═══ ROOMS ═══ */
.rr{display:flex;align-items:center;gap:10px;padding:12px;margin-bottom:6px;border-radius:12px;
background:rgba(255,255,255,0.015);border:1px solid transparent;cursor:pointer;transition:all 0.2s;
box-shadow:2px 2px 6px rgba(0,0,0,0.3),-1px -1px 3px rgba(255,255,255,0.01);position:relative;z-index:1}
.rr:hover{background:rgba(255,255,255,0.03);border-color:rgba(255,255,255,0.04);transform:translateX(2px)}
.rn{flex:1;font-size:13px;font-weight:500}.rc{font-size:11px;color:var(--t3)}
.rt{padding:4px 12px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid transparent;transition:all 0.2s;
box-shadow:2px 2px 4px rgba(0,0,0,0.3),-1px -1px 2px rgba(255,255,255,0.01)}
.rt.off{background:rgba(255,255,255,0.04);color:var(--t3)}
.rt.on{background:rgba(255,179,0,0.1);color:var(--amber);border-color:rgba(255,179,0,0.2);box-shadow:0 0 8px rgba(255,179,0,0.08)}

/* ═══ IRRIGATION ═══ */
.zone-row{display:flex;align-items:center;gap:10px;padding:8px 10px;margin-top:6px;border-radius:10px;
background:rgba(255,255,255,0.015);box-shadow:2px 2px 6px rgba(0,0,0,0.25),-1px -1px 3px rgba(255,255,255,0.01);position:relative;z-index:1}
.zone-name{flex:1;font-size:12px;font-weight:500}.zone-dur{font-size:10px;color:var(--t3)}
.zone-status{font-size:9px;font-weight:700;padding:3px 8px;border-radius:5px}
.zone-status.idle{background:rgba(255,255,255,0.04);color:var(--t3);box-shadow:var(--shadow-inset)}

/* ═══ ACTIVITY ═══ */
.evr{display:flex;align-items:center;gap:10px;padding:7px 0;position:relative;z-index:1}
.evd{width:7px;height:7px;border-radius:50%;background:var(--amber);box-shadow:0 0 6px rgba(255,179,0,0.4);flex-shrink:0}
.evdesc{flex:1;font-size:12px;font-weight:500}
.evt{font-size:9px;font-weight:600;color:var(--t3);padding:2px 7px;border-radius:5px;
background:rgba(255,255,255,0.02);box-shadow:var(--shadow-inset);font-variant-numeric:tabular-nums}

/* ═══ DIMMER MODAL ═══ */
.modal-overlay{position:fixed;inset:0;z-index:30;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px)}
.modal-box{position:relative;z-index:1;
background:linear-gradient(165deg,rgba(26,26,32,0.98),rgba(16,16,20,0.98));
border:1px solid var(--border-hi);border-radius:24px;padding:28px;width:360px;max-width:92vw;
box-shadow:0 24px 64px rgba(0,0,0,0.6),0 1px 0 rgba(255,255,255,0.06) inset;animation:modalIn 0.3s cubic-bezier(0.4,0,0.2,1)}
.modal-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent)}
.modal-hdr{display:flex;align-items:center;gap:10px;margin-bottom:20px;position:relative;z-index:1}
.modal-hdr .rn{flex:1;font-size:16px;font-weight:600}
.close-x{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;
background:linear-gradient(145deg,#222,#181818);border:1px solid rgba(255,255,255,0.06);color:var(--t3);font-size:14px;
box-shadow:var(--shadow-raised)}
.close-x:active{box-shadow:var(--shadow-inset)}
.modal-body{display:flex;gap:20px;height:200px;position:relative;z-index:1}
.vslider{width:50px;height:100%;position:relative;touch-action:none;cursor:pointer}
.vtrack{position:absolute;left:50%;transform:translateX(-50%);width:32px;height:100%;border-radius:16px;
background:#0e0e0e;border:1px solid rgba(255,255,255,0.04);box-shadow:var(--shadow-inset)}
.vfill{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:32px;border-radius:16px;pointer-events:none}
.vthumb{position:absolute;left:50%;transform:translateX(-50%);width:44px;height:22px;border-radius:11px;pointer-events:none;
background:linear-gradient(180deg,#3a3a3a,#222);border:1px solid rgba(255,255,255,0.08);
box-shadow:3px 3px 8px rgba(0,0,0,0.5),-2px -2px 4px rgba(255,255,255,0.02)}
.vthumb-grip{width:16px;height:2px;border-radius:1px;margin:9px auto 0;background:#fff}
.slider-info{flex:1;display:flex;flex-direction:column;justify-content:space-between}
.slider-pct{font-size:36px;font-weight:600}
.presets{display:flex;gap:6px;flex-wrap:wrap}
.presets span{padding:6px 14px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;
background:linear-gradient(145deg,rgba(30,30,38,0.9),rgba(20,20,26,0.9));
border:1px solid var(--border);color:var(--t3);transition:all 0.15s;box-shadow:var(--shadow-raised)}
.presets span:active{box-shadow:var(--shadow-inset)}
.presets span.act{background:rgba(255,179,0,0.1);border-color:rgba(255,179,0,0.25);color:var(--amber);box-shadow:0 0 10px rgba(255,179,0,0.06)}

@keyframes fu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes modalIn{from{opacity:0;transform:scale(0.94) translateY(10px)}to{opacity:1;transform:none}}

/* Phone portrait tweaks */
@media(max-width:600px) and (orientation:portrait){
.thermo-bezel{width:200px!important;height:200px!important}
.thermo-inner canvas{width:168px!important;height:168px!important}
.thv{font-size:34px!important}
.gc{width:80px!important;height:80px!important}.gc canvas{width:80px!important;height:80px!important}.gv{font-size:16px!important}
.modal-box{padding:20px!important;width:92vw!important}.modal-body{height:180px!important}.slider-pct{font-size:30px!important}
}
/* Landscape compact thermostat */
@media(orientation:landscape){
.thermo-bezel{width:200px;height:200px}.thermo-inner canvas{width:168px;height:168px}.thv{font-size:34px!important}
}
</style>
</head>
<body>


<div class="wrap">
<div class="hdr"><div><div class="greet" id="greetEl"></div><div class="date" id="dateEl"></div></div><div><div class="clk" id="clk"></div><div style="font-size:12px;color:#777;text-align:right;margin-top:3px">☀️ 19°</div></div></div>
<div class="pills"><div class="pill"><div class="pdot r"></div>HA</div><div class="pill"><div class="pdot g"></div>SUPABASE</div><div class="pill"><div class="pdot r"></div>SOLAR</div></div>
<div class="grid" id="grid"></div>
</div>
<div class="modal-overlay" id="dimModal"><div class="modal-bg" id="dimBg"></div><div class="modal-box" id="dimBox"></div></div>

<script>
var sections=['weather','scenes','climate','status','energy','rooms','irrigation','activity'];
var target=22,heatMode=true,heatOn=true,activeScene=1;
var rooms={Master:{level:0,name:'Master Bedroom',emoji:'🛏️',total:2},Lounge:{level:0,name:'Lounge',emoji:'🛋️',total:2},Office:{level:0,name:'Office',emoji:'💻',total:0}};
var si={weather:'<svg viewBox="0 0 256 256"><circle cx="128" cy="128" r="48"/><path d="M128 28v24M128 204v24M28 128h24M204 128h24M58 58l17 17M181 181l17 17M58 198l17-17M181 75l17-17"/></svg>',scenes:'<svg viewBox="0 0 256 256"><rect x="32" y="48" width="192" height="160" rx="8"/><path d="M32 88h192"/><circle cx="68" cy="68" r="8"/><circle cx="100" cy="68" r="8"/></svg>',climate:'<svg viewBox="0 0 256 256"><path d="M128 24v40M128 192v40"/><rect x="96" y="64" width="64" height="128" rx="32"/></svg>',security:'<svg viewBox="0 0 256 256"><path d="M128 24L40 72v56c0 64 40 112 88 128 48-16 88-64 88-128V72Z"/></svg>',lights:'<svg viewBox="0 0 256 256"><circle cx="128" cy="100" r="52"/><path d="M100 148v24M156 148v24M112 172h32"/></svg>',ev:'<svg viewBox="0 0 256 256"><rect x="24" y="80" width="208" height="96" rx="20"/><circle cx="76" cy="176" r="20"/><circle cx="180" cy="176" r="20"/><path d="M72 80V56h40v24"/></svg>',energy:'<svg viewBox="0 0 256 256"><path d="M160 16L72 136h56l-16 104 88-120h-56Z"/></svg>',blinds:'<svg viewBox="0 0 256 256"><rect x="32" y="32" width="192" height="32" rx="4"/><line x1="40" y1="88" x2="216" y2="88"/><line x1="40" y1="120" x2="216" y2="120"/><line x1="40" y1="152" x2="216" y2="152"/></svg>',rooms:'<svg viewBox="0 0 256 256"><path d="M128 24L232 104V232H168V168H88V232H24V104Z"/></svg>',irrigation:'<svg viewBox="0 0 256 256"><path d="M128 24C128 24 48 120 48 168a80 80 0 00160 0C208 120 128 24 128 24Z"/></svg>',activity:'<svg viewBox="0 0 256 256"><line x1="40" y1="64" x2="216" y2="64"/><line x1="40" y1="128" x2="216" y2="128"/><line x1="40" y1="192" x2="216" y2="192"/></svg>'};
function tickClock(){var n=new Date();document.getElementById('clk').textContent=[n.getHours(),n.getMinutes(),n.getSeconds()].map(function(v){return String(v).padStart(2,'0')}).join(':');var d=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];var m=['January','February','March','April','May','June','July','August','September','October','November','December'];document.getElementById('dateEl').textContent=d[n.getDay()]+' '+n.getDate()+' '+m[n.getMonth()];document.getElementById('greetEl').textContent=n.getHours()<12?'Good morning':n.getHours()<17?'Good afternoon':'Good evening'}tickClock();setInterval(tickClock,1000);
function buildGrid(){var g=document.getElementById('grid');g.innerHTML='';sections.forEach(function(k,i){var c=document.createElement('div');c.className='card';c.style.animation='fu 0.4s '+i*0.06+'s both';c.setAttribute('draggable','true');c.dataset.idx=i;c.innerHTML=getHTML(k);g.appendChild(c)});wireAll();wireDragDrop()}
function getHTML(k){
if(k==='weather')return'<div class="ch"><div class="sl">WEATHER</div>'+si.weather+'</div><div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;position:relative;z-index:1"><span style="font-size:40px">☀️</span><div><div style="font-size:38px;font-weight:300;letter-spacing:-2px">19°</div><div style="font-size:11px;color:#888">Clear sky · Feels 19° · 💧68% · 💨6km/h</div></div></div><div style="display:flex;justify-content:space-between;position:relative;z-index:1">'+[['Sun','☀️',29,16],['Mon','🌤️',30,15],['Tue','🌙',31,18],['Wed','❄️',23,16],['Thu','☁️',17,14]].map(function(f){return'<div style="text-align:center"><div style="font-size:10px;font-weight:600;color:#555">'+f[0]+'</div><div style="font-size:18px;margin:4px 0">'+f[1]+'</div><div style="font-size:12px;font-weight:600">'+f[2]+'°</div><div style="font-size:10px;color:#555">'+f[3]+'°</div></div>'}).join('')+'</div>';
if(k==='scenes'){var sd=[['Morning','🌅',0],['Day','☀️',1],['Evening','🏠',2],['Night','🌙',3],['Away','🏖️',4],['Movie','🎬',5]];return'<div class="ch"><div class="sl">SCENES</div>'+si.scenes+'</div><div class="scr">'+sd.map(function(s){return'<div class="sc'+(activeScene===s[2]?' a':'')+'" data-scene="'+s[2]+'"><span class="e">'+s[1]+'</span><span class="n">'+s[0]+'</span></div>'}).join('')+'</div>'}
if(k==='climate')return'<div class="ch"><div class="sl">CLIMATE</div><div class="mt '+(heatMode?'h':'c')+'" id="modeBtn">'+(heatMode?'🔥 HEAT':'❄️ COOL')+'</div></div><div class="thermo-wrap"><div class="thermo-bezel"><div class="thermo-outer"><div class="thermo-inner"><canvas id="tc" width="436" height="436"></canvas></div></div><div class="thermo-center"><div class="thv" id="tv">'+target.toFixed(1)+'°</div><div class="ths" id="tst" style="color:'+(heatMode?'#FF6B35':'#48CAE4')+'">'+(heatMode?'HEATING':'COOLING')+'</div><div class="thcur">Currently 19°</div></div></div><div class="tbtns"><div class="btn3d" id="tdn">−</div><div class="pwr3d '+(heatOn?'on':'')+'" id="pbtn"><div class="pwr-icon"></div></div><div class="btn3d" id="tup">+</div></div></div>';
if(k==='status')return'<div class="sg">'+[['SECURITY',si.security,'Disarmed','1 open · 10 zones','#4ADE80'],['LIGHTS',si.lights,'0/4','0 rooms active','#eee'],['EV',si.ev,'Disconnected','No EV plugged in','#eee'],['BLINDS',si.blinds,'All Closed','3 blinds','#eee']].map(function(s){return'<div class="sc2"><div class="ch" style="margin-bottom:4px"><div class="sl">'+s[0]+'</div>'+s[1]+'</div><div class="sv" style="color:'+s[4]+'">'+s[2]+'</div><div style="display:flex;justify-content:space-between;align-items:center"><div class="ss">'+s[3]+'</div><span class="arrow">→</span></div></div>'}).join('')+'</div>';
if(k==='energy')return'<div class="ch"><div class="sl">ENERGY</div>'+si.energy+'</div><div class="eg">'+[['Solar',0,5000,'#FFB300'],['Battery',0,100,'#4ADE80'],['Home',0,5000,'#48CAE4'],['EV',0,7000,'#FFB300']].map(function(g){return'<div class="gw"><div class="gc"><canvas class="ecv" data-v="'+g[1]+'" data-m="'+g[2]+'" data-c="'+g[3]+'" width="200" height="200"></canvas><div class="gv" style="color:'+g[3]+'">'+g[1]+'</div></div><div class="gl">'+g[0]+'</div></div>'}).join('')+'</div>';
if(k==='rooms'){var h='<div class="ch"><div class="sl">ROOMS</div>'+si.rooms+'</div>';for(var key in rooms){var r=rooms[key],on=r.level>0;h+='<div class="rr" data-room="'+key+'"><span style="font-size:20px">'+r.emoji+'</span><span class="rn">'+r.name+'</span><span class="rc">0/'+r.total+'</span><span class="rt '+(on?'on':'off')+'" data-toggle="'+key+'">'+(on?'ON':'OFF')+'</span></div>'}return h}
if(k==='irrigation')return'<div class="ch"><div class="sl">IRRIGATION</div>'+si.irrigation+'</div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;position:relative;z-index:1"><div style="font-size:14px;font-weight:600">Schedule</div><div style="font-size:9px;font-weight:700;padding:5px 12px;border-radius:6px;background:linear-gradient(145deg,#222,#181818);border:1px solid rgba(255,255,255,0.06);color:#777;cursor:pointer;box-shadow:3px 3px 8px rgba(0,0,0,0.4),-2px -2px 4px rgba(255,255,255,0.01)">RUN ALL</div></div>'+[['Front Lawn','15 min'],['Garden Beds','20 min'],['Rear Lawn','15 min'],['Veggie Patch','10 min']].map(function(z){return'<div class="zone-row"><span style="font-size:14px">🌱</span><span class="zone-name">'+z[0]+'</span><span class="zone-dur">'+z[1]+'</span><span class="zone-status idle">IDLE</span></div>'}).join('');
if(k==='activity')return'<div class="ch"><div class="sl">ACTIVITY</div>'+si.activity+'</div>'+[['💡','Entrance 2 → off','11:28'],['💡','Alfresco → off','11:19'],['💡','Entrance 2 → off','11:16'],['💡','Entrance 1 → off','11:16'],['💡','Alfresco → off','11:14']].map(function(e){return'<div class="evr"><div class="evd"></div><span style="font-size:15px">'+e[0]+'</span><span class="evdesc">'+e[1]+'</span><span class="evt">'+e[2]+'</span></div>'}).join('');return''}

// ═══ THERMOSTAT CANVAS — arc, thumb, ticks, on/off dim ═══
function drawThermo(){var c=document.getElementById('tc');if(!c)return;var W=c.width/2,ctx=c.getContext('2d'),dpr=2;c.width=W*dpr;c.height=W*dpr;ctx.scale(dpr,dpr);var CX=W/2,CY=W/2,R=W*0.42,SA=135*Math.PI/180,TS=270*Math.PI/180,on=heatOn;ctx.clearRect(0,0,W,W);
ctx.beginPath();ctx.arc(CX,CY,R,SA,SA+TS);ctx.strokeStyle=on?'rgba(255,255,255,0.03)':'rgba(255,255,255,0.012)';ctx.lineWidth=7;ctx.lineCap='round';ctx.stroke();
var frac=Math.max(0,(target-12)/18),ta=SA+frac*TS;
if(frac>0&&on){for(var i=0;i<60;i++){var f=i/60,a0=SA+f*(ta-SA),a1=SA+(f+1/60)*(ta-SA);var rr=Math.round(72+(255-72)*Math.min(f*2,1)),gg=Math.round(202+(140-202)*Math.min(f*2,1)),bb=Math.round(228-228*Math.min(f*1.5,1));ctx.beginPath();ctx.arc(CX,CY,R,a0,a1+0.02);ctx.strokeStyle='rgb('+rr+','+gg+','+bb+')';ctx.lineWidth=7;ctx.lineCap='round';ctx.stroke()}
ctx.beginPath();ctx.arc(CX,CY,R,SA,ta);ctx.strokeStyle=frac<0.5?'rgba(72,202,228,0.04)':'rgba(255,179,0,0.04)';ctx.lineWidth=18;ctx.lineCap='round';ctx.stroke();
var tx=CX+R*Math.cos(ta),ty=CY+R*Math.sin(ta);ctx.save();ctx.filter='blur(4px)';ctx.beginPath();ctx.arc(tx,ty,10,0,Math.PI*2);ctx.fillStyle=frac<0.4?'rgba(72,202,228,0.3)':frac<0.7?'rgba(255,179,0,0.3)':'rgba(255,87,34,0.3)';ctx.fill();ctx.restore();ctx.beginPath();ctx.arc(tx,ty,7,0,Math.PI*2);ctx.fillStyle=frac<0.4?'#48CAE4':frac<0.7?'#FFB300':'#FF5722';ctx.fill();ctx.beginPath();ctx.arc(tx,ty,3,0,Math.PI*2);ctx.fillStyle='#f0f0f0';ctx.fill()}
for(var j=0;j<=18;j++){var a=SA+(j/18)*TS,maj=j%3===0;ctx.beginPath();ctx.moveTo(CX+(R-(maj?2:4))*Math.cos(a),CY+(R-(maj?2:4))*Math.sin(a));ctx.lineTo(CX+(R+(maj?5:2))*Math.cos(a),CY+(R+(maj?5:2))*Math.sin(a));ctx.strokeStyle=maj?(on?'rgba(255,255,255,0.07)':'rgba(255,255,255,0.025)'):(on?'rgba(255,255,255,0.02)':'rgba(255,255,255,0.008)');ctx.lineWidth=maj?1:0.5;ctx.stroke()}}
function updateThermo(){var tv=document.getElementById('tv');if(tv){tv.textContent=target.toFixed(1)+'°';tv.style.color=heatOn?'#f0f0f0':'#444'}var ts=document.getElementById('tst');if(ts)ts.style.opacity=heatOn?'1':'0.25';var tc=document.querySelector('.thcur');if(tc)tc.style.opacity=heatOn?'1':'0.25';drawThermo()}

// ═══ WIRE EVERYTHING ═══
function wireAll(){var cv=document.getElementById('tc');if(cv){var drag=false;cv.addEventListener('pointerdown',function(e){var rect=cv.getBoundingClientRect(),cx=rect.left+rect.width/2,cy=rect.top+rect.height/2,dx=e.clientX-cx,dy=e.clientY-cy,dist=Math.sqrt(dx*dx+dy*dy),r=rect.width/2;if(dist>r*0.45&&dist<r*1.15){cv.setPointerCapture(e.pointerId);drag=true;thermoP(e);e.preventDefault()}});cv.addEventListener('pointermove',function(e){if(drag){thermoP(e);e.preventDefault()}});cv.addEventListener('pointerup',function(){drag=false});cv.addEventListener('pointercancel',function(){drag=false});function thermoP(e){var rect=cv.getBoundingClientRect(),W=rect.width,mx=(e.clientX-rect.left)/W*W,my=(e.clientY-rect.top)/W*W,deg=Math.atan2(my-W/2,mx-W/2)*180/Math.PI;if(deg<0)deg+=360;var arc=deg-135;if(arc<0)arc+=360;if(arc>270){arc=arc>315?0:270}target=Math.round((12+arc/270*18)*2)/2;target=Math.max(12,Math.min(30,target));updateThermo()}drawThermo()}
var tdn=document.getElementById('tdn'),tup=document.getElementById('tup');if(tdn)tdn.onclick=function(){target=Math.max(12,target-0.5);updateThermo()};if(tup)tup.onclick=function(){target=Math.min(30,target+0.5);updateThermo()};
var pb=document.getElementById('pbtn');if(pb)pb.onclick=function(){heatOn=!heatOn;pb.className='pwr3d '+(heatOn?'on':'');updateThermo()};
var mb=document.getElementById('modeBtn');if(mb)mb.onclick=function(){heatMode=!heatMode;mb.className='mt '+(heatMode?'h':'c');mb.innerHTML=heatMode?'🔥 HEAT':'❄️ COOL';var st=document.getElementById('tst');if(st){st.textContent=heatMode?'HEATING':'COOLING';st.style.color=heatMode?'#FF6B35':'#48CAE4'}};
document.querySelectorAll('.sc[data-scene]').forEach(function(el){el.onclick=function(){activeScene=+el.dataset.scene;document.querySelectorAll('.sc').forEach(function(s){s.classList.remove('a');s.querySelector('.n').style.color='#777'});el.classList.add('a');el.querySelector('.n').style.color='#FFB300'}});
document.querySelectorAll('.rr[data-room]').forEach(function(el){el.onclick=function(e){if(e.target.closest('[data-toggle]'))return;openDimmer(el.dataset.room)}});
document.querySelectorAll('[data-toggle]').forEach(function(el){el.onclick=function(e){e.stopPropagation();var key=el.dataset.toggle;rooms[key].level=rooms[key].level>0?0:0.75;updateRoom(key)}});
document.querySelectorAll('.ecv').forEach(function(c){var ctx=c.getContext('2d'),v=+c.dataset.v,m=+c.dataset.m,col=c.dataset.c,dpr=2,W=100;c.width=W*dpr;c.height=W*dpr;ctx.scale(dpr,dpr);var cx=W/2,cy=W/2,r=40,sa=135*Math.PI/180,ts=270*Math.PI/180;ctx.beginPath();ctx.arc(cx,cy,r,sa,sa+ts);ctx.strokeStyle='rgba(255,255,255,0.035)';ctx.lineWidth=8;ctx.lineCap='round';ctx.stroke();if(v>0){ctx.beginPath();ctx.arc(cx,cy,r,sa,sa+(v/m)*ts);ctx.strokeStyle=col;ctx.lineWidth=8;ctx.lineCap='round';ctx.stroke()}})}
function updateRoom(key){var r=rooms[key],on=r.level>0;var tog=document.querySelector('[data-toggle="'+key+'"]');if(tog){tog.className='rt '+(on?'on':'off');tog.textContent=on?'ON':'OFF'}}

// ═══ DIMMER MODAL ═══
function openDimmer(key){var r=rooms[key],lv=r.level,on=lv>0,pct=Math.round(lv*100);var a1=(0.15+lv*0.15).toFixed(2),a2=(0.3+lv*0.55).toFixed(2);document.getElementById('dimBox').innerHTML='<div class="modal-hdr"><span style="font-size:24px">'+r.emoji+'</span><span class="rn">'+r.name+'</span><span class="rt '+(on?'on':'off')+'" id="mrt">'+(on?'ON':'OFF')+'</span><span class="close-x" id="mcx">✕</span></div><div class="modal-body"><div class="vslider" id="mvs"><div class="vtrack"></div><div class="vfill" id="mfill" style="height:'+pct+'%;background:linear-gradient(to top,rgba(255,179,0,'+a1+'),rgba(255,179,0,'+a2+'))"></div><div class="vthumb" id="mthumb" style="bottom:'+Math.round(lv*178)+'px"><div class="vthumb-grip"></div></div></div><div class="slider-info"><div class="slider-pct" id="mpct" style="color:'+(on?'#FFB300':'#555')+'">'+pct+'%</div><div style="font-size:10px;color:#555">Brightness</div><div style="flex:1"></div><div class="presets" id="mpre">'+[25,50,75,100].map(function(p){return'<span data-p="'+p+'" class="'+(pct===p?'act':'')+'">'+p+'%</span>'}).join('')+'</div></div></div>';document.getElementById('dimModal').classList.add('open');document.getElementById('mcx').onclick=closeDimmer;document.getElementById('dimBg').onclick=closeDimmer;document.getElementById('mrt').onclick=function(e){e.stopPropagation();rooms[key].level=rooms[key].level>0?0:0.75;updateModal(key);updateRoom(key)};document.getElementById('mpre').querySelectorAll('span').forEach(function(sp){sp.onclick=function(){rooms[key].level=+sp.dataset.p/100;updateModal(key);updateRoom(key)}});var vs=document.getElementById('mvs'),d2=false;vs.addEventListener('pointerdown',function(e){vs.setPointerCapture(e.pointerId);d2=true;sliderP(e,key);e.preventDefault()});vs.addEventListener('pointermove',function(e){if(d2){sliderP(e,key);e.preventDefault()}});vs.addEventListener('pointerup',function(){d2=false});vs.addEventListener('pointercancel',function(){d2=false})}
function sliderP(e,key){var rect=document.getElementById('mvs').getBoundingClientRect();var frac=1-(e.clientY-rect.top)/rect.height;frac=Math.max(0,Math.min(1,frac));rooms[key].level=Math.round(frac*100)/100;updateModal(key);updateRoom(key)}
function updateModal(key){var r=rooms[key],lv=r.level,on=lv>0,pct=Math.round(lv*100);var f=document.getElementById('mfill'),t=document.getElementById('mthumb'),p=document.getElementById('mpct'),tog=document.getElementById('mrt');if(f){f.style.height=pct+'%';f.style.background='linear-gradient(to top,rgba(255,179,0,'+(0.15+lv*0.15).toFixed(2)+'),rgba(255,179,0,'+(0.3+lv*0.55).toFixed(2)+'))'}if(t)t.style.bottom=Math.round(lv*178)+'px';if(p){p.textContent=pct+'%';p.style.color=on?'#FFB300':'#555'}if(tog){tog.className='rt '+(on?'on':'off');tog.textContent=on?'ON':'OFF'}var pre=document.getElementById('mpre');if(pre)pre.querySelectorAll('span').forEach(function(sp){sp.className=+sp.dataset.p===pct?'act':''})}
function closeDimmer(){document.getElementById('dimModal').classList.remove('open')}

// ═══ DRAG AND DROP ═══
function wireDragDrop(){var cards=document.querySelectorAll('.card');var dragIdx=null;cards.forEach(function(card,i){card.addEventListener('dragstart',function(e){dragIdx=i;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',i)});card.addEventListener('dragend',function(){card.classList.remove('dragging');document.querySelectorAll('.card').forEach(function(c){c.classList.remove('drag-over')})});card.addEventListener('dragover',function(e){e.preventDefault();e.dataTransfer.dropEffect='move';if(+card.dataset.idx!==dragIdx)card.classList.add('drag-over')});card.addEventListener('dragleave',function(){card.classList.remove('drag-over')});card.addEventListener('drop',function(e){e.preventDefault();card.classList.remove('drag-over');var from=dragIdx;var to=+card.dataset.idx;if(from!==null&&from!==to){var item=sections.splice(from,1)[0];sections.splice(to,0,item);buildGrid()}})})}
buildGrid();
</script>
